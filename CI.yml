name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint and type check ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy evidence_council/

  # ── Test matrix ─────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=evidence_council \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Knowledge layer schema guard ────────────────────────────────────────
  # Ensures KnowledgeRecord fields haven't been silently renamed or removed.
  # This is a governance check — the JSONL schema is a public contract.
  schema-guard:
    name: Knowledge Layer Schema Guard
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check KnowledgeRecord fields are stable
        run: |
          python - <<'EOF'
          import dataclasses
          from evidence_council.knowledge_layer import KnowledgeRecord

          REQUIRED_FIELDS = {
              "layer_name", "probe", "detector", "ci_lower", "ci_upper",
              "pass_rate", "passes", "fails", "cost_score", "latency_ms",
              "governance_decision", "composite_score", "run_id",
              "committed_at", "reviewer_id", "reviewer_verdict", "reviewer_notes",
          }

          actual = {f.name for f in dataclasses.fields(KnowledgeRecord)}
          missing = REQUIRED_FIELDS - actual

          if missing:
              print(f"SCHEMA VIOLATION: Missing KnowledgeRecord fields: {missing}")
              print("Removing or renaming fields is a breaking change.")
              print("See CONTRIBUTING.md — knowledge layer schema is append-only.")
              raise SystemExit(1)

          print(f"Schema guard passed. {len(actual)} fields present.")
          EOF

  # ── Build check ─────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [test, schema-guard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
